# P11-5: the Old Testament work — Septuagint (Swete, already in the catalog
# under first1k-greek's tlg0527) beside the Clementine Vulgate's OT books.
# Work vocabulary = OSIS/Paratext-style tokens. Versification note (the §10
# "whoever registers a witness owns the shared-citation claim" contract):
# both witnesses follow the GREEK tradition where it bites hardest — Psalm
# numbering (Vulgate Psalms are numbered after the LXX) — so PSA refs align;
# books whose schemes genuinely diverge (e.g. Esdras) simply attest
# per-witness and render honestly.
ot:
  title: "Old Testament (Septuagint / Vulgate)"
  witnesses:
    # Swete's Septuaginta (1901), First1KGreek tlg0527 — synced, attribution
    # class. One catalog document per book; tokens for the double-recension
    # books pick THEODOTION as the plain token (the ecclesiastical text:
    # DAN/SUS/BEL) and suffix the Old Greek (-OG). 2ES = Swete's Esdras B
    # (Greek Ezra-Nehemiah, continuous chapters). tlg0527.tlg030
    # (Ecclesiastes) has no grc edition upstream — absent here, honest gap.
    - label: LXX (Swete, First1K)
      extractor: cts-verse
      documents:
        GEN: urn:cts:greekLit:tlg0527.tlg001.1st1K-grc1
