# The alignment-hub registry (P11-3 + P11-5, architecture §10).
#
# A WORK groups witnesses that carry the same text under a shared citation
# scheme; a WITNESS is one edition — one catalog document (`document:`) or a
# set of per-book documents (`documents:`) — plus how its citation refs are
# read. Adding a witness = adding an entry here (then `nabu sync` or
# `nabu rebuild` to regenerate the derived alignment_refs index) — never code,
# unless the witness needs a citation extractor that does not exist yet
# (known extractors: proiel-citation, the default; cts-verse).
#
# Per-witness keys:
#   document:  the catalog document urn (single-document form; refs carry
#              their own book tokens — proiel-citation). Registering a
#              witness before its source is synced is fine — it renders
#              "not synced".
#   documents: work-vocabulary book token => document urn, for an edition
#              minted as one document per book (cts-verse: ref = book token
#              + the passage urn's citation tail, "1.2" -> "GEN 1.2").
#   extractor: how refs are extracted (default proiel-citation: the
#              per-token citation_part values of the stored annotations;
#              cts-verse: registry book token + passage-urn tail).
#   label:     display label (default: the urn tail, e.g. "greek-nt";
#              REQUIRED for the documents: form).
#   books:     book-token aliases into the work's vocabulary, applied after
#              the generic ref fold (e.g. MK: MARK).
#
# `nabu align "MARK 2.3"` renders a verse across every witness below.

nt:
  title: "New Testament (parallel witnesses)"
  witnesses:
    # The five-way flagship — all PROIEL-family treebanks, all CC BY-NC-SA
    # (license class nc; labels ride every aligned row). Verse coverage is
    # honestly fragmentary per witness (the Armenian treebank samples
    # chapters; Gothic and Marianus are lacunose): absent verses render
    # "not attested", never fuzzed.
    - document: urn:nabu:proiel:greek-nt   # grc — the Vorlage
    - document: urn:nabu:proiel:latin-nt   # lat — Jerome's Vulgate (NT)
    - document: urn:nabu:proiel:gothic-nt  # got — Wulfila
    - document: urn:nabu:proiel:armenian-nt # xcl — classical Armenian NT (sampled)
    - document: urn:nabu:proiel:marianus   # chu — Codex Marianus (OCS)
    # P12-1: the ISWOC adapter landed — the West-Saxon Gospel of Mark mints
    # native "MARK 1.1" citation-parts (.docs/surveys/oe-survey.md). Renders "not
    # synced" honestly (P11-9 header summary) until the owner-fired first
    # `nabu sync iswoc`.
    - document: urn:nabu:proiel:wscp       # ang — OE Gospel of Mark (ISWOC)
    #
    # P11-5: the SBL Greek New Testament (CC BY 4.0, attribution) — a second
    # Greek witness beside the PROIEL treebank (distinct edition, never a
