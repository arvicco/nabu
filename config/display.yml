# Display-time mark policies (P27-0; docs/display.md) — how passage text is
# dressed for the TERMINAL, per language. Render-only: the canonical store,
# the search index, and MCP output never pass through these; `--display full`
# shows the stored bytes, and any applied transform is announced in a footer.
#
# Keys per language (primary subtag):
#   strip:    mark classes removed in the default display mode
#   keep:     classes kept by default but stripped by `--display plain`
#   isolates: wrap rendered runs in U+2067/U+2069 (RTL isolate) — harmless
#             where bidi is absent, correct where present
#   spacing:  insert a separator between grapheme clusters (P27-2) — the
#             Ogham legibility knob; between two Ogham letters the separator
#             is U+1680 OGHAM SPACE MARK, so the stemline stays continuous
#
# Mark classes are named codepoint sets defined in Nabu::Display::MARK_CLASSES
# (cantillation, points, maqaf, vedic-accents, titla, monotonic). `monotonic`
# (grc) is definable here but deliberately not defaulted.
#
# orv/bul carry EMPTY policies deliberately (P27-2): a policy row is what
# lets `--display translit` reach a language (render passes through policyless
# languages untouched); their default mode strips nothing — orv titla
# stripping was not part of the P27-0 owner gate and is not smuggled in here.
#
# pgl (Primitive Irish — attested ONLY in Ogham script, so the primary-subtag
# key is collision-free) defaults spacing ON: Ogham letters are stroke
# clusters on one shared stemline and merge unsegmented in a terminal;
# `--display full` restores the exact stored run. The corpus's sga-Ogam/und
# layers cannot be keyed without hitting Latin-script sga (corph) — journaled
# residue, backlog P27-2.
#
# Old Italic (U+10300–1032F; P29-2): the Sabellic axis names this block —
# ItAnt's osc-Ital-x-oscetr/xcg-Ital-x-xcglep language tags and CEIPoM's
# script column DECLARE the script while their stored text is Latin
# transliteration (censused ×0 Old Italic chars), but the sabellic-loans
# etymon headwords (𐌓𐌖𐌚𐌓𐌉𐌉𐌔) and any future kaikki-Umbrian shelf carry
# REAL codepoints. No policy row: census-first — there is nothing to strip
# and no transcoder to register; the terminal-side story (the
# font-noto-sans-old-italic cask) lives in docs/display.md §2–3 beside the
# ogham/coptic entries.
languages:
  hbo: { strip: [cantillation], keep: [points, maqaf], isolates: true }
  arc: { strip: [cantillation], isolates: true }
  san: { strip: [vedic-accents] } # Devanagari-script text; the IAST shelves are untouched
  chu: { strip: [titla] }
  orv: {}
  bul: {}
  pgl: { spacing: true }

# Edition-level conventions (P27-1) — per-SOURCE rules the `reading` mode
# executes (`--display diplomatic` shows the marks as stored). Census-first
# over the STORED passage bytes: the parsers already resolve most raw Leiden
# at parse time (supplements/additions/expansions/underdots censused ×0 in
# stored text — no rules invented for them; counts in backlog P27-1).
#
# Keys per source (registry slug):
#   reading:       rule → setting (rules: lacuna ellipsis|keep,
#                  erasures/surplus keep|unwrap, sigla strip|keep)
#   qere_display:  qere | ketiv | both (oshb ketiv/qere apparatus; "both"
#                  renders "ketiv [qere]")
#   gaiji:         placeholder | refs (P37-3; kanripo `&KR\d+;` refs — see below)
#
# ogham carries zero edition marks in its stored fixtures and oracc's
# braces/x-marks are content (determinatives misread unwrapped) — neither
# gets an entry; see backlog P27-1 for the journaled leaves.
#
# GAIJI (P37-3): the mandoku parser keeps kanripo's not-yet-encoded characters
# as `&KR\d+;` references verbatim in text. `gaiji: placeholder` makes the
# `reading` mode swap each ref for its RESOLVED glyph when config/gaiji/
# kanripo.tsv (the faithful KR-Gaiji codepoint subset) maps it, else the ⬚
# placeholder box — never a fake glyph; `--display diplomatic` keeps refs
# verbatim. cbeta is a documented NON-entry: its `<g>` fallback text is already
# the stored reading surface (the parser resolves it at parse time, P33-2), so
# there is no ref to display-transform — exactly the ogham/oracc no-entry logic.
sources:
  papyri-ddbdp: { reading: { lacuna: ellipsis } }
  edh: { reading: { lacuna: ellipsis, erasures: keep } } # an erasure is content — ⟦…⟧ stays
  riig: { reading: { lacuna: ellipsis, surplus: keep } } # {…} marks carver error — stays
  sblgnt: { reading: { sigla: strip } }
  oshb: { qere_display: qere }
  bhsa: { qere_display: qere } # P30-4: same MT apparatus — bhsa tokens carry the oshb qere shape
  kanripo: { gaiji: placeholder } # P37-3: &KR\d+; refs → resolved glyph or ⬚ placeholder in reading mode
