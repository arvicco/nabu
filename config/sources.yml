# Nabu source registry (see docs/architecture.md §5).
#
# One entry per corpus, keyed by its slug (lowercase [a-z0-9_-]). Shape:
#
#   <slug>:
#     adapter: Nabu::Adapters::Perseus   # adapter class name (resolved lazily)
#     enabled: false                     # THIS FILE is authoritative — flips
#                                        #   here reach the db on any
#                                        #   sync/rebuild/health reconcile
#     sync_policy: live                  # live | manual | frozen (default: manual)
#     translations: true                 # ALSO ingest parallel translations
#                                        #   (perseus-eng*) as aligned documents
#                                        #   (P7-4; default false — original-only)
#     license_watch: <url>               # OPTIONAL (P16-5): health --remote GETs
#                                        #   THIS url (any host) and sha256-compares
#                                        #   the body against the pin baseline —
#                                        #   license drift for upstreams whose terms
#                                        #   live in a README / record page, not a
#                                        #   github LICENSE file. First sight records
#                                        #   the baseline; a later mismatch renders
#                                        #   "license: CHANGED" naming the url.
#                                        #   Flipping one on is an OWNER decision:
#                                        #   verify the url serves the terms directly
#                                        #   (no redirect — the probe does not follow
#                                        #   them) before enabling.
#     fuzzy_index: true                  # include in the trigram fragment index
#                                        #   (search --fuzzy; P16-4, design §4 —
#                                        #   documentary sources only, index
#                                        #   economics; default false)
#
# Registered sources follow. `enabled: false` until a first real sync is
# verified by hand (CLAUDE.md "add a new adapter" checklist).

perseus-greek:
  adapter: Nabu::Adapters::Perseus
  enabled: true   # first real sync verified + owner sign-off 2026-07-03 (P2-5)
