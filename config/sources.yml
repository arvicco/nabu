cdli:
  adapter: Nabu::Adapters::Cdli
  enabled: false   # P31-2: flip after the owner-fired first sync
                   # (checklist §6: bin/nabu sync cdli — GitFetch clone +
                   # LFS materialization, 154.8 MB csv + 86.9 MB atf —
                   # then eyeball nabu show urn:nabu:cdli:p000725
                   # (proto-cuneiform, >>Q composite links) beside a
                   # metadata-only artifact and 5 random tablets).
                   # MEASURED census at snapshot d66b12b (full payloads
                   # through the production parser+Loader, 2026-07-19):
                   # 353,156 docs loaded (135,201 with text / 218,097
                   # metadata-only — the owner-approved universal
                   # catalog), 2,186,961 passages; QUARANTINE FLOOR 142
                   # (junk lines — missing-dot labels, a stray BOM,
                   # "& blank space" — upstream defects named in the
                   # AtfParser class note); discovery skips 54 duplicate
                   # &P headers by rule. Timing on this box: discover
                   # 45 s (1.2 GB RSS), parse+load 9.0 min (657 docs/s),
                   # catalog +1.15 GB.
  # P31-2: CDLI — the universal cuneiform catalog + C-ATF transliteration
  # mass (github.com/cdli-gh/data; HONESTLY the 2023-10 snapshot — the
  # daily dump is dead, cdli.earth API journaled as the freshness
  # channel, not wired). New atf parser family (built for reuse: eBL-ATF
  # registers as a dialect in P31-3). License = the bespoke open grant
  # from cdli.earth/terms-of-use VERBATIM in the manifest → attribution;
  # images entirely out of scope. NO #lem lines exist in C-ATF → the
  # tier below is a defensive pin: nothing from cdli may ever enter the
  # lemma index as gold (lemma search stays ORACC-gold). Periods (the
  # catalog's own year envelopes) → AxisBuilder::CdliDates; genre/
  # period/provenience/collection/ruler → facets; >>Q + composite_id +
  # bdtns concordances → reference edges (producer cdli). Snapshot is
  # frozen-in-practice but the repo is live git → re-syncs owner-fired.
  sync_policy: manual
  lemma_tier: silver
ebl:
  adapter: Nabu::Adapters::Ebl
  enabled: false   # P31-3: flip after the owner-fired first sync
                   # (checklist §6: bin/nabu sync ebl — one 73.9 MB GET,
                   # sha-pinned — then eyeball nabu show
                   # urn:nabu:ebl:1868,0523.2 (tr.en riders, @i{} markup)
                   # beside urn:nabu:ebl:im.61678 (Ur III %sux, date
                   # facet) and 5 random fragments). MEASURED census at
                   # the snapshot (full payload through the production
                   # adapter, 2026-07-19): 23,288 docs (23,289 members −
                   # the K.5808 byte-identical twin, skipped by rule) /
                   # 325,728 passages / 66 zero-text metadata-only /
                   # QUARANTINE FLOOR 0; languages akk 19,673 · sux 3,615
                   # (%-shift rule); 19,230 reference edges; parse+census
                   # ~6 s on this box.
  # P31-3: eBL Fragmentarium — the Electronic Babylonian Library's
  # transliterated museum fragments (Kuyunjik/Babylon…), eBL-ATF as the
  # atf family's SECOND dialect (EblAtfParser — the family seams built in
  # P31-2 carried it without weakening the C-ATF core). Bootstrap = the
  # citable Zenodo snapshot 10.5281/zenodo.10018951 (2023-10-18,
  # fragments.json 73.9 MB, sha256-pinned; the live Fragmentarium had
  # 37,296 fragments at scout time — the deposit packages the 23,289
  # TRANSLITERATED ones). The sanctioned ebl.lmu.de/api/fragments/
  # retrieve-all endpoint (4-8 min/batch) is the OWNER-FIRED refresh
  # channel ONLY — documented, never automated. LICENSE CONFLICT recorded
  # verbatim in the manifest: JOHD 10.5334/johd.148 License section says
  # CC BY-NC-SA 4.0 for fragments.json, the Zenodo field says cc-by-4.0 —
  # class held at nc (MCP-excluded per standing nc discipline) until
  # email №24 resolves it. The eBL Corpus side (Gilgameš chapter
  # editions) is OUT: no packaged dump, the grant covers fragments only.
  # #tr.en/#tr.ar/#tr.de per-line translations ride as tr annotations
  # (the P31-2 carry, extents verbatim); cdliNumber (79.9%) →
  # urn:nabu:cdli:p… edges into the P31-2 space, editedInOraccProject →
  # urn:nabu:oracc:<proj>:<P> edges, bdtns concordance (producer ebl).
  # Period vocabulary carries no year envelopes → facets only, no axis
  # extractor. #lem exists on ONE fragment (BM.47447, 71 lines) → carried
  # verbatim as annotations, nothing enters the lemma index; the tier
  # below is the cdli-style defensive pin, not a lemma claim.
  sync_policy: manual   # versioned DOI is frozen; refresh = owner-fired retrieve-all, then a deliberate re-pin
  lemma_tier: silver
cuc:
  adapter: Nabu::Adapters::Cuc
  enabled: false   # until the owner-fired first real sync (checklist §6:
                   # bin/nabu sync cuc — sparse GitFetch cone tf/0.2.8 +
                   # README.md, 19 files ≈ 3.5 MB — then eyeball
                   # nabu show urn:nabu:cuc:ktu-1.14:I.1 (Keret),
                   # urn:nabu:cuc:ktu-1.4:V.1 (Baal) and 5 random lines,
                   # then flip).
  # P31-4: CUC — the Copenhagen Ugaritic Corpus (CACCHT project,
  # github.com/DT-UCPH/cuc), THIRD text-fabric registrant and the FIRST
  # uga source — a NEW axis language (dossier: `bin/nabu ingest --shelf
  # language uga`, family lane "Northwest Semitic"). Census verified
  # against otype.tf at the pinned commit 0408967b (2026-07-19): 146,017
  # signs / 27,770 words / 7,616 lines / 334 columns / 279 tablets (the
  # upstream README's "278" undercounts its own otype). Document =
  # tablet (urn:nabu:cuc:ktu-<n>.<n> from the censused-uniform "KTU
  # <n>.<n>" names), passage = column.line — the corpus's own citation
  # grain. Text = the corpus's own {sign} transliteration stream; the
  # cuneiform lane (usign) + per-sign text-critical flags (cert, emen
  # restored/redundant/excised/missing/remark, alt, cont) ride each
  # token's "signs" entries verbatim. 72 whitespace-only lines skipped +
  # listed in document metadata (never faked). LICENSE: every .tf header
  # verbatim — British spelling — "@licence=Creative Commons
  # Attribution-NonCommercial 4.0 International License" → class nc,
  # MCP-excluded. Version PINNED tf/0.2.8 (the sparse cone IS the pin);
  # upstream is work-in-progress, new versions land in new dirs →
  # re-pin is an owner decision.
  sync_policy: manual

peshitta:
  adapter: Nabu::Adapters::Peshitta
  enabled: false   # until the owner-fired first real sync (checklist §6:
                   # bin/nabu sync peshitta — sparse GitFetch cone tf/0.2 +
                   # docs/about.md, 13 files ≈ 9 MB — then eyeball
                   # nabu show urn:nabu:peshitta:gn:1.1,
                   # urn:nabu:peshitta:ps:23.1 (the shepherd psalm, Hebrew
                   # numbering) and 5 random verses, `align "GEN 1.1"` (now
                   # SEVEN-legged: MT×2 ↔ LXX ↔ Vulgate ↔ WEB ↔ Targum ↔
                   # Peshitta), then flip).
  # P31-4: the Peshitta OT incl. deuterocanon (ETCBC/peshitta; OCR of the
  # Leiden Vetus Testamentum Syriace / Codex Ambrosianus, syrocr +
  # Text-Fabric conversion), FOURTH text-fabric registrant. Census
  # verified against otype.tf at the pinned commit 9850f5ad (2026-07-19):
  # 426,835 words / 65 books / 1,269 chapters / 31,341 verses. Document =
  # book (urn:nabu:peshitta:<siglum downcased> — gn, orm_a; the A/B
  # manuscript recensions are honest sibling documents with the witness
  # letter riding metadata + verse annotations verbatim), passage = verse
  # <doc>:<chapter>.<verse>. Language syc; ~492 upstream word forms are
  # non-NFC (seyame/point order) → NFC at the adapter boundary per house
  # rule (syc is NOT on the exemption list). MEASURED MT versification
  # (chapter-grain census over all 39 protocanonical books + verse spot
  # checks: Joel 4 ch / Malachi 3 ch / Jonah 1:16+2:11 / Psalms 150
  # Hebrew-numbered) → the ot hub's SEVENTH leg with the OSHB/BHSA/Targum
  # conservative map verbatim (config/alignments.yml; same holdouts), and
  # the psalms work rides the P13-5 Hebrew→Greek remap (fourth reuse).
  # LICENSE: docs/about.md verbatim "The plain text of the Peshitta, its
  # conversion to Text-Fabric format, is subject to the CC-BY-NC license"
  # (the conversion program alone is MIT) → class nc, MCP-excluded.
  # Version PINNED tf/0.2 (the sparse cone IS the pin); upstream is
  # archived/unsupported (repostatus badge) → effectively frozen.
  sync_policy: manual

syriac-corpus:
  adapter: Nabu::Adapters::SyriacCorpus
  enabled: false   # until the owner-fired first real sync (checklist §6:
                   # bin/nabu sync syriac-corpus — sparse GitFetch cone
                   # data/tei, 632 TEI files ≈ 39 MB — then eyeball
                   # nabu show urn:nabu:syriac-corpus:1:2 (Aphrahat Dem. 1
                   # §1), a hymn line of a memra doc and 5 random passages,
                   # then flip).
  # P31-4: the Digital Syriac Corpus (srophe/syriac-corpus; BYU/Oxford/
  # Vanderbilt/Texas A&M) — 632 TEI documents of classical Syriac
  # literature (Aphrahat, Ephrem, Jacob of Serugh, the Peshitta NT
  # letters…), the survey's "lowest-friction big win". NEW srophe-tei
  # family (their own TEI application, NOT EpiDoc — censused over all 632
  # files: body divs of 16 types carrying p/ab/lg/l/head blocks; 1,958 of
  # 6,801 divs unnumbered, block numbering partial → passages minted by
  # document-order block ordinal with the div path + block tag/@n riding
  # annotations as the citation lane — the ADDRESSABILITY VERDICT: no
  # uniform upstream citation scheme exists). Document = file
  # (urn:nabu:syriac-corpus:<file number> — the syriaccorpus.org id;
  # 69.xml and 126.xml carry MISMATCHED <idno> URIs (61, 125 — one a
  # duplicate, one a filename gap), so the FILENAME mints identity and
  # idno rides metadata verbatim). Language syc (langUsage censused
  # uniformly "syr"); per-block xml:lang syr/en/ar → syc/eng/ara.
  # Apparatus <note>s stripped from text, riding annotations verbatim.
  # LICENSE: per-file <availability> censused over ALL 632 files —
  # uniformly "Creative Commons — Attribution 4.0 International — CC BY
  # 4.0" (base texts PD per the availability note) → class attribution.
  # Upstream drifts slowly (last commit 2026-03) → re-syncs owner-fired.
  sync_policy: manual

