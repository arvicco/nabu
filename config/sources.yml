# Nabu source registry (see docs/architecture.md §5).
#
# One entry per corpus, keyed by its slug (lowercase [a-z0-9_-]). Shape:
#
#   <slug>:
#     adapter: Nabu::Adapters::Perseus   # adapter class name (resolved lazily)
#     enabled: false                     # THIS FILE is authoritative — flips
#                                        #   here reach the db on any
#                                        #   sync/rebuild/health reconcile
#     sync_policy: live                  # live | manual | frozen (default: manual)
#     translations: true                 # ALSO ingest parallel translations
#                                        #   (perseus-eng*) as aligned documents
#                                        #   (P7-4; default false — original-only)
#
# Registered sources follow. `enabled: false` until a first real sync is
# verified by hand (CLAUDE.md "add a new adapter" checklist).

perseus-greek:
  adapter: Nabu::Adapters::Perseus
  enabled: true   # first real sync verified + owner sign-off 2026-07-03 (P2-5)
  sync_policy: live
  # P7-4, owner-approved strategic review: ingest the English editions already
  # in the cloned repo as aligned parallel documents (highest perseus-eng<n>
  # per work, language eng, CC BY-SA unchanged). Recovery: parse-only resync.
  translations: true

perseus-latin:
  adapter: Nabu::Adapters::PerseusLatin
  enabled: true   # first real sync + owner sign-off 2026-07-07: 290 docs / 264,555 passages (+85 eng editions, 75,921 passages), Aeneid 1.1 eyeballed grc+eng
  sync_policy: live   # same as its greekLit sibling: PerseusDL updates continuously
  translations: true  # owner 2026-07-07: aligned English editions, same mechanism as perseus-greek (P7-4)

first1k-greek:
  adapter: Nabu::Adapters::First1kGreek
  enabled: true   # first real sync verified + owner sign-off 2026-07-04
  sync_policy: live
  # P9-1, owner-directed 2026-07-08 (Phase 9): ingest the ~45 English editions
  # already in the cloned repo as aligned parallel documents (highest -eng<n>
  # per work, language eng, CC BY-SA unchanged; same mechanism as perseus-greek
  # P7-4). Recovery: parse-only resync.
  translations: true

ud:
  adapter: Nabu::Adapters::UniversalDependencies
  enabled: true   # first real sync verified + owner sign-off 2026-07-04
  sync_policy: manual   # treebanks version independently and change rarely

proiel:
  adapter: Nabu::Adapters::Proiel
  enabled: true   # first real sync verified + owner sign-off 2026-07-04
  # Upstream proiel-treebank is frozen at release 20180408; its successor is
  # proiel/syntacticus-treebank-data. Frozen = one-shot snapshot, no re-sync.
  sync_policy: frozen

torot:
  adapter: Nabu::Adapters::Torot
  enabled: true   # first real sync verified + owner sign-off 2026-07-04
  # TOROT (Tromsø Old Russian + OCS) is the same PROIEL 2.1 XML as proiel, but
  # unlike the frozen proiel-treebank it still gets occasional releases:
  # re-syncable, just not on a live schedule.
  sync_policy: manual

iswoc:
  adapter: Nabu::Adapters::Iswoc
  enabled: false  # flip after the owner-fired first real sync (CLAUDE.md checklist)
  # ISWOC (Old English treebank, PROIEL 2.1 XML; ang-filtered — the repo's ten
  # medieval Romance texts are out of corpus scope). Upstream iswoc-treebank is
  # GitHub-archived at its final commit (2023-05-02): genuinely frozen, the
  # proiel-treebank precedent. Successor repo note in the adapter header.
  sync_policy: frozen

papyri-ddbdp:
  adapter: Nabu::Adapters::Papyri
  enabled: true   # P5-1 minting fix + owner sign-off 2026-07-04: 61,347 docs / 920,766 passages; 9,354 quarantines audited honest (text-less stubs)
  # idp.data updates continuously (born-digital editing platform), but a
  # multi-GB clone/re-sync is an owner decision, not a scheduled one.
  sync_policy: manual

gretil:
  adapter: Nabu::Adapters::Gretil
  enabled: true    # OWNER SIGN-OFF 2026-07-08: first real sync fired and eyeballed
                   # ("Enable GRETIL pls, it's synced"). 773 docs / 696,158 passages
                   # live after P9-4c recovery (118 -> 8 quarantines); Rāmāyaṇa,
                   # Brahmasūtra, Bhāgavata spot-checked. Mirror: mmehner/
                   # gretil-corpus-tei (784 XML, byte-identical to the live site).
  # nc Sanskrit TEI corpus (~784 texts / ~240 MB); a full clone is an owner
  # decision, not a scheduled one — and the corpus has been stable since 2021.
  sync_policy: manual

oracc:
  adapter: Nabu::Adapters::Oracc
  enabled: true    # OWNER SIGN-OFF 2026-07-09: first real sync fired and
                   # eyeballed ("Enable oracc pls"). 1,794 docs / 21,080
                   # passages, 0 errors; akk (qēmu) + sux (lugal) lemma
                   # search verified live. Scope: rimanum + etcsri; P11-6
                   # extended to five (adds saao/saa01, rinap/rinap1, dcclt)
                   # — owner-fired re-sync after merge pulls the new projects.
  # Per-project HTTP zips (the first non-git fetch path); re-syncing is an
  # owner decision, not a scheduled one.
  sync_policy: manual
  # The ORACC JSON carries word glosses but NO prose translations (P9-5a:
  # they live only in the ATF #tr.en source layer) — nothing to opt into;
  # aligned English is a future separate acquisition.
  translations: false

lexica:
  adapter: Nabu::Adapters::Lexica
  enabled: true    # OWNER SIGN-OFF 2026-07-10 ("flip all sources enabled" after
                   # P11 merge): synced, 168,133 entries (LSJ + L&S incl. the
                   # recovered alpha/theta files), define/nabu_define eyeballed.
                   # (CLAUDE.md checklist §6: bin/nabu sync lexica, then
                   # nabu define μῆνις / officium spot-checks)
  # PerseusDL/lexica (~160 MB git repo, CC BY-SA 4.0): LSJ + Lewis & Short —
  # the FIRST dictionary-shaped source (content_kind :dictionary: entries,
  # not passages; architecture §11). Upstream still gets occasional edits:
  # re-syncable, but not on a live schedule.
  sync_policy: manual

vulgate:
  adapter: Nabu::Adapters::Vulgate
  enabled: true    # OWNER SIGN-OFF 2026-07-10: synced, 73 books / 35,809 verses
                   # (complete Clementine canon), align OT witness eyeballed
                   # (GEN 1.1, JON 1 trilingual).
                   # (CLAUDE.md checklist §6: bin/nabu sync vulgate — ~76 MB
                   # open-bibles clone — then spot-check nabu show
                   # urn:nabu:vulgate:mrk:2.3 and 5 random verses)
  # P11-5: the FULL Clementine Latin bible (one USFX file in the open-bibles
  # collection; public domain). One document per book; both alignment-hub
  # works (nt + ot) list its books as witnesses. open-bibles is curated and
  # occasionally updated: re-syncable, not on a live schedule.
  sync_policy: manual

eng-web:
  adapter: Nabu::Adapters::EngWeb
  enabled: true    # OWNER SIGN-OFF 2026-07-10: synced, 84 books / 37,624 verses,
                   # FRT/GLO skip-by-rule; trilingual JON 1 eyeballed.
                   # (CLAUDE.md checklist §6: bin/nabu sync eng-web — ~76 MB
                   # open-bibles clone, shared with vulgate — then spot-check
                   # nabu show urn:nabu:eng-web:jon:1.1 and 5 random verses)
  # P11-8: the World English Bible (WEB, eBible.org; public domain). One USFX
  # file in the same open-bibles collection as the Clementine Vulgate; one
  # document per book. The readable English witness of both alignment-hub works
  # (nt + ot). Upstream is curated and occasionally updated: re-syncable, not on
  # a live schedule.
  sync_policy: manual

sblgnt:
  adapter: Nabu::Adapters::Sblgnt
  enabled: true    # OWNER SIGN-OFF 2026-07-10: synced, 27 books / 7,939 verses,
                   # NT witness live in align; show --random eyeballed.
                   # (CLAUDE.md checklist §6: bin/nabu sync sblgnt — ~2.3 MB
                   # clone — then spot-check nabu show urn:nabu:sblgnt:mark:2.3)
  # P11-5: the SBL Greek New Testament (Faithlife/SBLGNT, CC BY 4.0), 27
  # per-book verse-per-line text files. The nt alignment work's second Greek
  # witness (beside PROIEL greek-nt). Upstream edits are rare (v1.2 2023):
  # re-syncable, not on a live schedule.
  sync_policy: manual

aspr:
  adapter: Nabu::Adapters::Aspr
  enabled: false  # flip after the owner-fired first real sync (CLAUDE.md checklist)
  # ASPR (Anglo-Saxon Poetic Records, OTA 3009): the complete OE poetry corpus
  # as ONE 2.2 MB TEI file over plain HTTP — the first single-file fetch path
  # (Nabu::FileFetch). CC BY-SA 3.0 (in-file teiHeader) -> attribution.
  # Upstream is effectively frozen (Last-Modified 2019, deposit 1993), but the
  # OTA record is not archive-locked the way a read-only git repo is: manual.
  sync_policy: manual

bosworth-toller:
  adapter: Nabu::Adapters::BosworthToller
  enabled: false  # flip after the owner-fired first real sync (CLAUDE.md checklist)
  # Bosworth-Toller (P12-3): An Anglo-Saxon Dictionary from the official
  # LINDAT dump (hdl 11234/1-3532, CC BY 4.0 -> attribution) — the third
  # dictionary-shelf occupant (content_kind :dictionary) and the first CSV
  # dictionary (parser family bosworth-csv). ONE ~84 MB CSV over HTTP
  # (Nabu::FileFetch, DSpace bitstream /content URL). The deposit is a frozen
  # v0.1 (Last-Modified 2021-04-26): manual — a re-sync only matters if the
  # team publishes a new dump version.
  sync_policy: manual

ccmh:
  adapter: Nabu::Adapters::Ccmh
  enabled: false  # flip after the owner-fired first real sync (CLAUDE.md checklist)
  # CCMH (Corpus Cyrillo-Methodianum Helsingiense, Kielipankki; P13-2): the
  # four gospel OCS manuscripts as the corpus's own CES XML over four plain
  # HTTPS file URLs (per-manuscript Nabu::FileFetch subdirs). CC BY 4.0
  # (bundle README.txt verbatim) -> attribution. Assemanianus + Savvina are
  # the canon gaps closed; Marianus/Zographensis are ALT-EDITIONS of the
  # PROIEL/TOROT witnesses — never dedupe (conventions §3). The three
  # txt-only texts (Suprasliensis, the two Vitae) ship no XML: deferred by
  # owner decision 2026-07-11. Upstream frozen since 2021: manual.
  sync_policy: manual

# Template for the next source (leave commented until its adapter exists):
