# Nabu source registry (see docs/architecture.md §5).
#
# One entry per corpus, keyed by its slug (lowercase [a-z0-9_-]). Shape:
#
#   <slug>:
#     adapter: Nabu::Adapters::Perseus   # adapter class name (resolved lazily)
#     kind: source                       # source (default, omit) | shelf | module
#                                        #   (P39-0) — what the row IS. shelf =
#                                        #   the four local-* memory shelves
#                                        #   (local fetch, no network, up=local,
#                                        #   NO sync_policy). module = machinery
#                                        #   (kr-gaiji/bridging): sanctioned
#                                        #   fetch, zero catalog rows, MUST be
#                                        #   enabled: false.
#     enabled: false                     # THIS FILE is authoritative — flips
#                                        #   here reach the db on any
#                                        #   sync/rebuild/health reconcile
#     sync_policy: auto                  # auto | manual | frozen (default:
#                                        #   manual). auto = swept by sync --all;
#                                        #   manual = owner-fired by name
#                                        #   (upstream may be very much alive);
#                                        #   frozen = immutable snapshot. Omit
#                                        #   on kind: shelf rows (kind implies it).
#     translations: true                 # ALSO ingest parallel translations
#                                        #   (perseus-eng*) as aligned documents
#                                        #   (P7-4; default false — original-only)
#     license_watch: <url>               # OPTIONAL (P16-5): health --remote GETs
#                                        #   THIS url (any host) and sha256-compares
#                                        #   the body against the pin baseline —
#                                        #   license drift for upstreams whose terms
#                                        #   live in a README / record page, not a
#                                        #   github LICENSE file. First sight records
#                                        #   the baseline; a later mismatch renders
#                                        #   "license: CHANGED" naming the url.
#                                        #   Flipping one on is an OWNER decision:
#                                        #   verify the url serves the terms directly
#                                        #   (no redirect — the probe does not follow
#                                        #   them) before enabling.
#     fuzzy_index: true                  # include in the trigram fragment index
#                                        #   (search --fuzzy; P16-4, design §4 —
#                                        #   documentary sources only, index
#                                        #   economics; default false)
#     axes: [classical, ...]             # research-axis memberships (P35-0) —
#                                        #   REQUIRED, >= 1, names defined in
#                                        #   config/axes.yml. Axes are TAGS
#                                        #   (multi-membership deliberate,
#                                        #   whole-source grain); an axis name
#                                        #   never equals a slug (validated)
#
# Registered sources follow. `enabled: false` until a first real sync is
# verified by hand (CLAUDE.md "add a new adapter" checklist).

perseus-greek:
  adapter: Nabu::Adapters::Perseus
  axes: [classical]
  siblings: cts  # P34-0: the dotted-version form (perseus-eng<n> editions of one work)
  enabled: true   # first real sync verified + owner sign-off 2026-07-03 (P2-5)
  sync_policy: auto   # P39-0: was `live` — swept by sync --all (PerseusDL updates continuously)
  # P7-4, owner-approved strategic review: ingest the English editions already
  # in the cloned repo as aligned parallel documents (highest perseus-eng<n>
  # per work, language eng, CC BY-SA unchanged). Recovery: parse-only resync.
  translations: true

perseus-latin:
  adapter: Nabu::Adapters::PerseusLatin
  axes: [classical]
  siblings: cts  # P34-0: the dotted-version form (same mechanism as perseus-greek)
  enabled: true   # first real sync + owner sign-off 2026-07-07: 290 docs / 264,555 passages (+85 eng editions, 75,921 passages), Aeneid 1.1 eyeballed grc+eng
  sync_policy: auto   # P39-0 (was `live`): same as its greekLit sibling — PerseusDL updates continuously
  translations: true  # owner 2026-07-07: aligned English editions, same mechanism as perseus-greek (P7-4)

first1k-greek:
  adapter: Nabu::Adapters::First1kGreek
  axes: [classical]
  siblings: cts  # P34-0: the dotted-version form (the -eng<n> editions, P9-1)
  enabled: true   # first real sync verified + owner sign-off 2026-07-04
  sync_policy: auto   # P39-0: was `live` — swept by sync --all (OGL/First1K updates continuously)
  # P9-1, owner-directed 2026-07-08 (Phase 9): ingest the ~45 English editions
  # already in the cloned repo as aligned parallel documents (highest -eng<n>
  # per work, language eng, CC BY-SA unchanged; same mechanism as perseus-greek
  # P7-4). Recovery: parse-only resync.
  translations: true

ud:
  adapter: Nabu::Adapters::UniversalDependencies
  # P35-0 vs the D35 draft: +celtic (two sga treebanks) +sinitic (two lzh treebanks) — TREEBANKS-verified
  axes: [classical, slavic, germanic, celtic, hittite, indic, sinitic]
  enabled: true   # first real sync verified + owner sign-off 2026-07-04
  sync_policy: manual   # treebanks version independently and change rarely
  # P31-0 (2026-07-19): TREEBANKS grew to ten — hittite-hittb
  # (UD_Hittite-HitTB: 136 sentences / 1,309 words of Hoffner & Melchert
  # tutorial examples with real KBo/KUB source lines; language hit;
  # CC BY-SA 4.0 verbatim → per-document attribution override, source
  # class stays nc). EXPECTED SYNC DELTA at the next owner-fired
  # `bin/nabu sync ud` (no per-treebank enablement exists): +1 repo clone,
  # +1 doc / 136 passages, hit joins the lemma-indexed languages.
  # P31-6 (2026-07-19): TREEBANKS grew to twelve — ancient-greek-perseus +
  # latin-perseus (UD conversions of the native Perseus AGDT/LDT v2.1,
  # 02-sources row 17's UD half; both verbatim CC BY-NC-SA 2.5 Generic →
  # ride the source nc class bare, no override). EXPECTED SYNC DELTA at the
  # next owner-fired `bin/nabu sync ud`: +2 repo clones; docs at UD's
  # one-doc-per-treebank-split grain — UD_Ancient_Greek-Perseus ships
  # train/dev/test = +3 docs (censused 2026-07-19: 13,919 sentences /
  # 202,989 words), UD_Latin-Perseus ships train/test only, NO dev split =
  # +2 docs (censused: 2,273 sentences / 29,223 words); so +5 docs /
  # +16,192 passages total, grc/lat lemma lanes gain treebank-gold rows
  # (no new language).
  # P32-0 (2026-07-19): TREEBANKS grew to fourteen — classical-chinese-kyoto
  # + classical-chinese-tuecl (language lzh, the library's first lzh lane;
  # both BY-SA 4.0 by LICENSE.txt → per-document attribution override.
  # KYOTO LICENSE DISCREPANCY RECORDED: its README metadata says
  # `License: PD`, contradicting LICENSE.txt — LICENSE.txt authoritative,
  # see test/fixtures/ud/README.md).
  # ============ SCALE HONESTY — READ BEFORE THE NEXT SYNC ============
  # UD_Classical_Chinese-Kyoto is ~42.2 MB of conllu: 86,239 sentences /
  # 433,169 words / 9,641 lemmas (censused whole 2026-07-19: train 74,609
  # sents / 36.5 MB, dev 6,102 / 3.0 MB, test 5,528 / 2.7 MB). This ONE
  # treebank DWARFS everything the ud source has synced to date (the four
  # treebanks of the 2026-07-04 first sync sum to 76,642 sentences — all
  # thirteen treebank repos were censused whole upstream at P32-0 fixture
  # time) and is ~3.2x the largest single treebank in the set
  # (Sanskrit-Vedic 27,182 sents / ITTB 26,977 are next). Honest bound: it
  # does NOT exceed the COMBINED thirteen-other-treebank registry, which
  # sums to 107,664 sentences / 1,493,979 words — but it alone grows that
  # total by +80%. The next owner-fired `bin/nabu sync ud` is a step
  # change, not an increment:
  # +2 repo clones; Kyoto ships train/dev/test = +3 docs / +86,239
  # passages, TueCL ships test only = +1 doc / +100 passages; so +4 docs /
  # +86,339 passages total, and lzh enters the lemma-indexed languages at
  # ~433k token rows in one bite. Budget sync time accordingly.
  # ===================================================================
  # P32-0 JOURNAL — UD_Old_Japanese-LMJ NOT taken (2026-07-19): the repo is
  # misnamed (its dev material is Heike/Late-Middle-Japanese era, not Old
  # Japanese) and its master branch is EMPTY of data — verified at fixture
  # time: master holds only CONTRIBUTING.md, LICENSE.txt and a template
  # README, no .conllu. Old Japanese arrives via ONCOJ instead (P32-2,
  # 02-sources row 97). Watch upstream: if LMJ's master ever gains data,
  # it is a NEW license-gate decision, not a config flip.
  # №26 REPLY (2026-07-20, GitHub issue, mr-martian/UD): release is
  # BLOCKED on validator errors (the quest.ms.mff.cuni.cz validation
  # report is the readiness signal to watch) and the ojp label STAYS —
  # ISO 639 has no Late-Middle-Japanese code. At the future gate nabu
  # picks its own stage label (languages.md rule 3), not upstream's ojp.
  # P40-1 (2026-07-22): TREEBANKS grew to fifteen — icelandic-icepahc
  # (UD_Icelandic-IcePaHC, a rule-based UD conversion of the Icelandic Parsed
  # Historical Corpus; language is, the library's first is lane; CC BY-SA 4.0
  # verbatim → per-document attribution override, source class stays nc).
  # DIACHRONIC HONESTY: the corpus spans the 12th–21st century (Old Norse
  # sagas to modern prose) but UD files it under the one modern tag `is` —
  # the RNC-Middle-Russian-under-orv precedent (P10-2), recorded not hidden.
  # EXPECTED SYNC DELTA at the next owner-fired `bin/nabu sync ud`: +1 repo
  # clone; docs at UD's one-doc-per-treebank-split grain — IcePaHC ships
  # train/dev/test = +3 docs (~one witness per split of the ~11.9 MB dev &
  # test halves), is joins the lemma-indexed languages. Budget accordingly.

