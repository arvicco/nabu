# Nabu configuration.
#
# Every key below is optional. The values shown are the built-in defaults, so
# this file is safe to commit and a fresh checkout works without editing it.
# Delete a key to fall back to its default; edit a value to override it.
#
# Relative paths are resolved against the project root; absolute paths are used
# verbatim (handy for keeping the canonical corpus on a larger disk).

paths:
  # Canonical corpus — the permanent, immutable asset (files, git-tracked).
  # Application code is read-only here except through the adapter/ad-hoc
  # pipeline. Default: <project>/canonical
  canonical: canonical

  # Derived SQLite layer (catalog.sqlite3, vectors.sqlite3). Fully rebuildable
  # from canonical/ via `nabu rebuild`, so it is safe to delete.
  # Default: <project>/db
  db: db

# Backup destination for `nabu backup` (P7-2). A path UNDER a mounted external
# volume — the owner wires the real disk here. `nabu backup` file-level-rsyncs
# canonical/ (attic included), db/history.sqlite3 (the ledger), config/, and the
# derived dbs to this target, and REFUSES to run when the volume is not mounted
# (the mount-point guard: an unmounted target is a bare dir on the boot disk).
# No default — a backup with neither this key nor --to PATH errors loudly.
#
# Until real hardware is wired, a virtual volume simulates it (docs/ops.md §9):
#   hdiutil create -size 20g -type SPARSEBUNDLE -fs APFS \
#     -volname NabuBackup ~/NabuBackup.sparsebundle
#   hdiutil attach ~/NabuBackup.sparsebundle          # mounts /Volumes/NabuBackup
#
# Wired 2026-07-07 (owner decision): the NabuBackup sparsebundle volume
# simulates the external disk; swapping in real hardware = change nothing
# (mount the real disk under the same volume name) or edit this path.
backup:
  target: /Volumes/NabuBackup/nabu
