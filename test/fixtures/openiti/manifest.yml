# Nabu fixture manifest (P5-4 "fixture sentinel"). Schema is documented in
# test/fixtures/perseus/manifest.yml. Built from this directory's README.md.
#
# OpenITI mARkdown text files live in the OpenITI/RELEASE GitHub repo under a
# flat per-author tree: data/<AuthorURI>/<AuthorURI.BookURI>/<versionUri[.ext]>.
# The version file has NO extension when "completed/plain", or a status
# extension (.mARkdown, .completed, .inProgress). A raw GET of the file's path
# on the `master` branch returns the FULL upstream file; five of the six texts
# here are documented body TRIMS (whole: false, fetched for URL-liveness only),
# and the one tiny hadith is kept byte-for-byte (whole: true). mARkdown is
# plaintext with NO closing tags, so a trim is a clean truncation at a line
# boundary (header kept intact through the metadata splitter); nothing appended.
#
# `master` is a MOVING ref (it advances each release); these files are from
# release 2025.1.9 (Zenodo DOI 10.5281/zenodo.17767721, 2025-12-30). The
# central metadata TSV is a Zenodo artifact; the .sample.tsv here is a trim of
# it (header row + the six fixture books + a stratified assortment).
#
# trim: values use YAML folded block scalars (>-) so colons/quotes/hashes in the
# prose stay literal.
source: openiti
# No adapter exists yet (P41 groundwork packet). adapter_test stays null: it is
# only set for dirs whose fixtures are ALL whole:true, and five here are trims.
adapter_test: null
retrieved: 2026-07-22
