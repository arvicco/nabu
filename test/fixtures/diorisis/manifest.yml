# All three files live INSIDE the frozen figshare v1 zip (no per-file raw
# URL), so none is whole-file byte-comparable by a plain GET: the Hymn is a
# byte-verbatim WHOLE of its in-zip file, the other two are documented
# TRIMS (whole: false; recipe in README.md). The sentinel fetches the zip
# URL for liveness only. The figshare v1 artifact is immutable (md5
# f3a26efa7e7d2b93d1bcca26900d180a, sha256-pinned in the adapter): a drift
# at this URL is an incident, never an update — upstream's update channel
# is a separate token-gated JSON API (journaled in sources.yml).
# adapter_test is null: the adapter test asserts trimmed-sentence counts,
# which untrimmed upstream files would false-fail.
