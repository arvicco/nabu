# byte-compared). adapter_test is null: the Peshitta adapter test asserts
# slice-level counts, which untrimmed upstream files would false-fail.
# Re-trim per the README table after any refresh. Pinned upstream commit:
# 9850f5addade26f681334aa475570bef9b0b440a (master, retrieved 2026-07-19).
