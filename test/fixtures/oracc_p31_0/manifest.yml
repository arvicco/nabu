# test/fixtures/perseus/manifest.yml. Built from this directory's README.md.
#
# ZIP-EXTRACT PROVENANCE (P31-0 expansion projects). ORACC serves NO raw
# per-file URLs — the delivery unit is the per-project zip; every entry was
# extracted 2026-07-19 from its project zip (four zips downloaded whole and
# sha256-recorded in the README; the 561.8 MB epsd2-admin-ur3.zip read by
# HTTP ranged requests, never downloaded whole). A raw GET of any listed
# path is impossible, so every entry is refetchable: false. Re-acquiring
# means re-fetching the project zip (or ranged members) and re-applying the
# README extract/trim procedure. corpusjson members are byte-verbatim
# whole; catalogue.json trimmed to the fixtured ids; metadata.json whole
# for ario/earlylit/literary, formats(/witnesses)-trimmed for royal and
# admin-ur3 (see README).
