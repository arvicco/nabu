#
# Nearly every fixture here is a TRIM (first 50 sentence blocks) of a much
# larger upstream *-ud-test.conllu, so whole: false — a fresh GET returns the
# full file and is fetched for URL-liveness only, never byte-compared (the
# one exception: DipWBG's test split is only 34 blocks, kept whole).
# adapter_test is null: the UD adapter test asserts trimmed-block counts,
# which an untrimmed upstream file would false-fail. Re-trim per the README
# procedure after any refresh (refresh overwrites the trim with the full
# upstream file).
