# Nabu fixture manifest (P5-4). Schema documented in
# test/fixtures/perseus/manifest.yml. Built from this directory's README.md.
#
# Files 1-2 are whole: true (byte-identical to upstream at HEAD 1eac9ee,
# 2026-07-18). Files 3-4 are documented TRIMS (whole: false) — a fresh GET
