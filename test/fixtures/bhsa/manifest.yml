# Nabu fixture manifest (P5-4). Schema documented in
# test/fixtures/perseus/manifest.yml. Built from this directory's README.md.
#
# otype.tf and otext.tf are byte-verbatim WHOLES (drift there is real
# drift); every other file is a documented TRIM of a much larger upstream
# feature file (whole: false — a fresh GET returns the full file and is
# fetched for URL-liveness only, never byte-compared). adapter_test is null:
# the BHSA adapter test asserts slice-level counts, which untrimmed
# upstream files would false-fail. Re-trim per the README table after any
# refresh. Pinned upstream commit:
# 4db00e2157915495e1a4d3d57e41223df24775da (master, retrieved 2026-07-18).
