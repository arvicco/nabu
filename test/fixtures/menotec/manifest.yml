# Nabu fixture manifest (P5-4). Schema documented in
# test/fixtures/perseus/manifest.yml. Built from this directory's README.md.
#
# Menotec (Old Norwegian / Old Norse, PROIEL XML) is served ONLY through the
# INESS portal's session-based REST API (clarino.uib.no/iness/rest) — NOT the
# proiel/proiel-treebank GitHub repo. The download URL carries an ephemeral
# session-id, so a raw GET cannot reproduce these bytes: both entries are
# refetchable: false (provenance iness-api). P40-2's adapter re-acquires them
# via the get-session -> get-treebank-documents -> get-sentences flow the
# README documents. adapter_test is null (no adapter exists yet).
source: menotec
adapter_test:
retrieved: 2026-07-22
files:
  - path: non-pamphilus-dep/ch1-head5.xml
    refetchable: false
    provenance: iness-api
    whole: false
    reason: >-
      INESS get-sentences export (command=get-sentences&download-mode=tiger-xml&
      type=dependency&treebank=non-pamphilus-dep&document-id=Ch.%201), trimmed to
      the first 5 of 65 sentence blocks. The endpoint requires an ephemeral
      session-id (command=get-session), so no static raw GET reproduces it.
    trim: first 5 sentence blocks (per-sentence PROIEL-XML fragments) of the Pamphilus "Ch. 1" export; 119,901 B -> 6,332 B
  - path: non-edda-regius-dep/alvissmal-head5.xml
    refetchable: false
    provenance: iness-api
    whole: false
    reason: >-
      INESS get-sentences export (command=get-sentences&download-mode=tiger-xml&
      type=dependency&treebank=non-edda-regius-dep&document-id=Alvíssmál), trimmed
      to the first 5 of 80 sentence blocks. Ephemeral session-id required, as above.
    trim: first 5 sentence blocks (per-sentence PROIEL-XML fragments) of the Poetic Edda / Codex Regius "Alvíssmál" export; 195,397 B -> 6,325 B
