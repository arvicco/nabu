# Nabu fixture manifest (P5-4). Schema documented in
# test/fixtures/perseus/manifest.yml. Built from this directory's README.md.
#
# ZIP-EXTRACT PROVENANCE. ORACC serves NO raw per-file URLs — the open-data
# delivery unit is the whole per-project zip (rimanum.zip 2.9 MB, etcsri.zip
# 12.9 MB). Every fixture here was extracted 2026-07-09 from those zips
# (corpusjson + metadata whole; catalogue trimmed to the fixtured ids — see
# README). A raw GET of any listed path is impossible, so every entry is
# refetchable: false: `fixtures:check` SKIPS them (printing the reason) and
# `fixtures:refresh` refuses to touch them. Re-acquiring means re-downloading
# the project zip and re-applying the README extract/trim procedure.
source: oracc
