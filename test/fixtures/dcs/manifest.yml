# Nabu fixture manifest (P5-4). Schema documented in
# test/fixtures/perseus/manifest.yml. Built from this directory's README.md.
#
# All chapter/lookup files are TRIMS of much larger upstream files (whole:
# false — a fresh GET returns the full file and is fetched for URL-liveness
# only, never byte-compared); the two readmes are byte-verbatim wholes.
# adapter_test is null: the DCS adapter test asserts trimmed-block counts,
# which untrimmed upstream files would false-fail. Re-trim per the README
# table after any refresh. Pinned upstream commit:
# 04e0778d3dc971030229179e25eea043d06ff397 (master, retrieved 2026-07-18).
source: dcs
adapter_test:
retrieved: 2026-07-18
files:
  - path: dcs/data/readme.md
    url: https://raw.githubusercontent.com/OliverHellwig/sanskrit/master/dcs/data/readme.md
    whole: true
    trim:
  - path: dcs/data/conllu/readme.md
    url: https://raw.githubusercontent.com/OliverHellwig/sanskrit/master/dcs/data/conllu/readme.md
    whole: true
    trim:
  - path: dcs/data/conllu/lookup/chapter-info.xml
    url: https://raw.githubusercontent.com/OliverHellwig/sanskrit/master/dcs/data/conllu/lookup/chapter-info.xml
    whole: false
    trim: the three fixture chapters' <chapter> entries, byte-verbatim, in the upstream <info> wrapper (8,858,624 B -> 1,532 B)
  - path: "dcs/data/conllu/files/Aitareyopaniṣad/Aitareyopaniṣad-0000-AU, 1, 1-8816.conllu"
