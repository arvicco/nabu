# test/fixtures/perseus/manifest.yml. Built from this directory's README.md.
#
# ZIP-EXTRACT PROVENANCE (the oracc pattern). ETCSL's delivery unit is the
# single etcsl.zip on the OTA's LLDS record (hdl 20.500.14106/2518); no raw
# per-file URL serves transliterations/ or translations/ individually, so
# every entry is refetchable: false: `fixtures:check` SKIPS them (printing
# the reason) and `fixtures:refresh` refuses to touch them. Re-acquiring
# means re-downloading the zip (sha256
# d1a35b396399216deaeb483d5954ae603662e73c4e77f23e39f2e7b58466962b,
# retrieved 2026-07-19) and re-applying the README trim procedure. The
# corpus is complete (October 2006) and frozen upstream — drift is not
# expected, ever.
