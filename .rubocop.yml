# Setting AllCops.Exclude OVERRIDES RuboCop's default excludes (vendor/,
# node_modules/, .git/, tmp/) unless inherit_mode merges it — and CI installs
# gems to vendor/bundle INSIDE the repo, where gem-shipped .rubocop.yml files
# require plugins we don't carry (found live: rubocop-rspec, PR #6 CI).
inherit_mode:
  merge:
    - Exclude

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    # canonical/ is gitignored upstream corpus data, not project code; real
    # syncs pull sources (e.g. torot) that ship their own .rb tooling, which
    # must never fail our lint.
    - canonical/**/*

# Enforce frozen string literal magic comment in every Ruby file.
Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

# Project uses double quotes consistently.
Style/StringLiterals:
  EnforcedStyle: double_quotes

# Documentation of every class/module is noise for a small internal tool.
Style/Documentation:
  Enabled: false

# Metrics cops are noisy for parser/adapter code; disable rather than
# litter the codebase with inline directives.
Metrics/AbcSize:
  Enabled: false
Metrics/BlockLength:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Metrics/ModuleLength:
  Enabled: false
Metrics/ParameterLists:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false

Layout/LineLength:
  Max: 120
